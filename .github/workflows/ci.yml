name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run guard checks
        run: python scripts/check_go_guards.py

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/codexass

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build with script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Build with script (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh

      - name: Verify build output
        shell: bash
        run: |
          test -d build
